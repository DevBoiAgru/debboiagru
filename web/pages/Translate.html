<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English to Brainrot</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins">
    <link rel="icon"
    href="https://raw.githubusercontent.com/DevBoiAgru/DevBoiAgru/main/assets/images/LogoTransparent.png"
    type="image/x-icon">
    <!-- Open graph -->
    <meta property="og:title" content="Brainrot translator">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Brainrot translator by DevBoiAgru">
    <meta property="og:description" content="Convert normal english to brainrot">
    <meta property="og:url" content="{{ url_for('brainrot') }}">
    <meta name="theme-color" content="#08EA8E">

    <style>
        #submit,.content,body{display:flex}*,.lds-dual-ring,.lds-dual-ring:after{box-sizing:border-box}body,html{margin:0;height:100%}body{flex-direction:column;align-items:center;justify-content:center;font-family:Poppins,sans-serif;background-color:#181818}.content{padding:50px;border-radius:50px;background:#e0e0e0;box-shadow:inset 20px 20px 60px #bebebe,inset -20px -20px 60px #fff;flex-direction:column;width:500px;height:500px}#englishtext{width:400px;height:300px;border-radius:20px;resize:none;padding:20px;font-size:1.5em;background-color:#eee}#submit{align-items:center;justify-content:center;width:100%;height:40px;border-radius:15px;border:none;background-color:#00f;color:#fff;transition:.1s ease-in-out;font-size:1em}#submit:hover{background-color:#5858ff}#submit:active{background-color:#9292ff}#submit:disabled{background-color:#9595ff}.lds-dual-ring{display:inline-block;width:30px;height:30px}.lds-dual-ring:after{content:" ";display:block;width:30px;height:30px;margin-top:auto;border-radius:50%;border:3.4px solid currentColor;border-color:currentColor transparent;animation:1.2s linear infinite lds-dual-ring}@keyframes lds-dual-ring{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
    </style>
</head>
<body>
    <div class="content">
        <!-- Simple form in the middle with white background -->
        <form>
            <h1 style="margin: 0% 0% 5% 0%;">English to Brainrot translator</h1>
            <textarea name="text" id="englishtext" cols="30" rows="10" required spellcheck="false"></textarea>
            <button id="submit">Translate</button>
        </form>
    </div>
    <footer>
        <p style="color: rgb(212, 212, 212);">Made by <a href="https://github.com/DevBoiAgru" target="_blank" style="color: rgb(212, 212, 212);">DevBoiAgru</a></p>
    </footer>
    <script>
        let submit=document.getElementById("submit");submit.addEventListener("click",()=>{let e=document.getElementById("englishtext");submit.innerHTML='<div class="lds-dual-ring"></div>',submit.disabled=!0,e.disabled=!0,""==e.value?(submit.innerHTML="Translate",submit.disabled=!1):fetch("/translate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text:e.value})}).then(e=>e.json()).then(t=>{e.value=t.brainrot,submit.innerHTML="Translate",e.disabled=!1,submit.disabled=!1})});
    </script>
</body>
</html>
