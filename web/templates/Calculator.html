<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best calculator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/comic-mono@0.0.1/index.css">

    <!-- Open graph -->
    <meta property="og:title" content="Scientific calculator">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Calculator by DevBoiAgru">
    <meta property="og:description" content="Highly accurate">
    <meta property="og:url" content="{{ url_for('calculator') }}">
    <meta name="theme-color" content="#08EA8E">

</head>
<body style="font-family: Comic Mono;">
    <h1>Scientific calculator.</h1>
    <h3>Accurate, no floating point errors</h3>
    <div class="user-input">
        <input type="number" id="num1" class="num-input" autocomplete="off">
        <select id="operator">
            <option value="add">+</option>
            <option value="subtract">-</option>
            <option value="multiply">×</option>
            <option value="divide">÷</option>
        </select>
        <input type="number" id="num2" class="num-input" autocomplete="off">
        <button id="calculate" onclick="calculate()">Calculate</button>
    </div>
    <div id="result"></div>
    <script>
        let num1 = document.getElementById("num1");
        let num2 = document.getElementById("num2");
        let operator = document.getElementById("operator");
        let theletterR = new Audio("{{ url_for('static', filename='badbone.mp3')}}");
        function calculate(){
            // if (false){
            if (num1.value == "" || num2.value == ""){
                alert("Operand is missing!");
            }
            else{
                document.getElementById("result").classList.add("theletterh");
                theletterR.play();
            }
        }
    </script>
    <style>
        .num-input{
            width: 50px;
        }
        .theletterh{
            height: 430px !important;
        }
        #result{
            margin-top: 50px;
            width: 604px;
            height: 0px;
            background-size: cover;
            transition: all 1.3s linear;
            background-image: url("{{ url_for('static', filename='idk.png')}}");
        }
    </style>
</body>
</html>
