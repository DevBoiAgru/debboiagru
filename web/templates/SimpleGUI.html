<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Mulish">
    <title>Quote from {{data["content"]}}</title>
</head>
<body>
    <div class="content">
        <header>
            <a href="{{ url_for(request.endpoint) }}?raw=1">API</a>
            <a href=" {{url_for('index')}} ">Home</a>
            <a href="{{ url_for('quote') }}">Refresh</a>
        </header>
    
        <h1 class="quote">{{data["heading"]}}</h1>
        <hr>
        <h1>- {{data["content"]}}</h3>
    </div>
</body>
<style>
*{
    box-sizing: border-box;
}
body{
    background-color: #2b2b2b;
    background-image: linear-gradient(#2b2b2b, #1f1f1f, #2b2b2b);
    background-position: center;
    background-repeat: no-repeat;
    padding: 50px;
    font-family: "Mulish";
}
.content{
    border-radius: 50px;
    background: #ffffff;
    box-shadow: inset 10px 10px 20px #9e9e9e,
                inset -10px -10px 20px #ffffff;
    padding: 60px;
    width: 100%;
    height: 100%;
    border-radius: 15px;
    
}
.quote{
    font-size: 3.5em;
    color: #1f1f1f;
    text-shadow: 2px 2px 0px rgba(0,0,0,0.23);
}
header{
    width: 100%;
    display: flex;
    justify-content: space-around;
    margin-bottom: 50px;
}
header > a{
    text-decoration: none;
    font-weight: bold;
    font-size: 1.4em;
    text-shadow: 0px 0px 0px rgba(0,0,0,0.33);
    color: #2b2b2b;
    transition: all 0.2s ease-in-out;
}
header > a:hover{
    transform: translateY(-5px);
    text-shadow: 3px 3px 0px rgba(0,0,0,0.23);
}
</style>
</html>
